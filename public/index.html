<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TAG Online 4P</title>
    <style>
      :root {
        --bg: #0b132b;
        --panel: #1c2541;
        --accent: #5bc0be;
        --text: #f3f5f7;
        --danger: #ff595e;
        --ok: #8ac926;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1b2a4b, var(--bg));
        color: var(--text);
        font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .app { width: min(1100px, 96vw); display: grid; gap: 14px; }
      .hud { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      .card {
        background: color-mix(in srgb, var(--panel) 92%, black);
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 12px;
        padding: 10px 12px;
      }
      #status { min-width: 240px; }
      #messages { flex: 1; min-height: 42px; }
      #board {
        width: 100%;
        background: linear-gradient(150deg, #0e223f, #102c3a);
        border: 2px solid rgba(255,255,255,.2);
        border-radius: 14px;
        display: block;
      }
      .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      input, button {
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,.2);
        padding: 8px 10px;
        background: #081221;
        color: var(--text);
      }
      button {
        background: var(--accent);
        color: #032d2e;
        border: none;
        font-weight: 700;
        cursor: pointer;
      }
      .leaderboard { min-width: 280px; }
      .leaderboard ol { margin: 8px 0 0; padding-left: 20px; }
      .tagged { color: var(--danger); font-weight: 700; }
      .not-tagged { color: var(--ok); font-weight: 700; }
      .room-code { font-weight: 700; letter-spacing: 1px; }
      .ended-banner {
        color: #ffd166;
        font-weight: 700;
      }
      @media (max-width: 900px) {
        .hud { flex-direction: column; align-items: stretch; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="hud">
        <div class="card row">
          <input id="name" placeholder="Tu nombre" maxlength="20" />
          <input id="room" placeholder="Código sala (ej: AB12CD)" maxlength="12" />
          <input id="duration" type="number" min="1" max="60" value="5" title="Duración en minutos" />
          <button id="create">Crear sala</button>
          <button id="join">Unirse</button>
        </div>
        <div class="card" id="status">Estado: Elige crear o unirte a una sala.</div>
        <div class="card" id="messages">Bienvenido al TAG online.</div>
        <div class="card">Sala: <span id="roomCode" class="room-code">-</span></div>
        <div class="card">Tiempo: <span id="timer" class="room-code">--:--</span></div>
        <div class="card leaderboard">
          <strong>Ranking (tiempo sin ser "la lleva")</strong>
          <ol id="scores"></ol>
        </div>
      </section>
      <canvas id="board" width="960" height="640"></canvas>
    </main>

    <script>
      const canvas = document.getElementById('board');
      const ctx = canvas.getContext('2d');

      const statusEl = document.getElementById('status');
      const messagesEl = document.getElementById('messages');
      const scoresEl = document.getElementById('scores');
      const roomCodeEl = document.getElementById('roomCode');
      const timerEl = document.getElementById('timer');
      const nameInput = document.getElementById('name');
      const roomInput = document.getElementById('room');
      const durationInput = document.getElementById('duration');
      const joinBtn = document.getElementById('join');
      const createBtn = document.getElementById('create');

      let myId = null;
      let myRoomCode = null;
      let state = null;
      let lastEventTime = 0;
      let pollSeq = 0;
      let lastAppliedPollSeq = 0;
      let joining = false;
      const keys = { up: false, down: false, left: false, right: false };

      function setMessage(text) {
        messagesEl.textContent = text;
      }

      function fmtMs(ms) {
        const sec = Math.floor(ms / 1000);
        const m = String(Math.floor(sec / 60)).padStart(2, '0');
        const s = String(sec % 60).padStart(2, '0');
        return `${m}:${s}`;
      }

      function sanitizeDurationMinutes(value) {
        const parsed = Number(value);
        if (!Number.isFinite(parsed)) return 5;
        return Math.max(1, Math.min(60, Math.round(parsed)));
      }

      function normalizeRoomCode(code) {
        return String(code || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 12);
      }

      async function postJson(url, payload) {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        return res.json();
      }

      async function enterRoom(create) {
        if (joining) return;
        joining = true;
        joinBtn.disabled = true;
        createBtn.disabled = true;
        const name = (nameInput.value || '').trim();
        const roomCode = normalizeRoomCode(roomInput.value);
        const durationMinutes = sanitizeDurationMinutes(durationInput.value);
        durationInput.value = String(durationMinutes);
        try {
          const result = await postJson('/join', {
            name,
            roomCode,
            create,
            durationMinutes,
          });
          if (result.error) {
            statusEl.textContent = 'Estado: No se pudo entrar';
            setMessage(result.error);
            return;
          }

          myId = result.playerId;
          myRoomCode = result.roomCode;
          roomInput.value = myRoomCode;
          roomCodeEl.textContent = myRoomCode;
          statusEl.textContent = `Estado: En sala ${myRoomCode}. Muévete con WASD o flechas.`;
          setMessage(`Entraste a la sala ${myRoomCode}. Comparte ese código con tus amigos.`);
        } finally {
          joining = false;
          joinBtn.disabled = false;
          createBtn.disabled = false;
        }
      }

      async function sendInput() {
        if (!myId) return;
        await postJson('/input', { playerId: myId, input: keys });
      }

      function keyToInput(code, pressed) {
        if (code === 'ArrowUp' || code === 'KeyW') keys.up = pressed;
        if (code === 'ArrowDown' || code === 'KeyS') keys.down = pressed;
        if (code === 'ArrowLeft' || code === 'KeyA') keys.left = pressed;
        if (code === 'ArrowRight' || code === 'KeyD') keys.right = pressed;
      }

      window.addEventListener('keydown', (e) => {
        keyToInput(e.code, true);
        sendInput();
      });

      window.addEventListener('keyup', (e) => {
        keyToInput(e.code, false);
        sendInput();
      });

      window.addEventListener('beforeunload', () => {
        if (myId) {
          navigator.sendBeacon('/leave', JSON.stringify({ playerId: myId }));
        }
      });

      joinBtn.addEventListener('click', () => enterRoom(false));
      createBtn.addEventListener('click', () => enterRoom(true));

      async function pollState() {
        const requestedPlayerId = myId;
        const seq = ++pollSeq;
        try {
          const res = await fetch(`/state?playerId=${encodeURIComponent(requestedPlayerId || '')}`, { cache: 'no-store' });
          const nextState = await res.json();
          if (seq < lastAppliedPollSeq) return;
          lastAppliedPollSeq = seq;
          state = nextState;

          if (state.roomCode) {
            roomCodeEl.textContent = state.roomCode;
            myRoomCode = state.roomCode;
          }
          timerEl.textContent = fmtMs(state.remainingMs || 0);

          if (state.events && state.events.length) {
            const newest = state.events[state.events.length - 1];
            if (newest.at > lastEventTime) {
              lastEventTime = newest.at;
              setMessage(newest.message);
            }
          }

          if (myId && state.players && state.players[myId]) {
            const me = state.players[myId];
            const cls = me.isIt ? 'tagged' : 'not-tagged';
            if (state.gameEnded) {
              statusEl.innerHTML = `Estado: Sala <span class="room-code">${myRoomCode}</span> | <span class="ended-banner">PARTIDA TERMINADA</span> | Ganador: ${state.winnerName || 'Sin ganador'}`;
            } else {
              statusEl.innerHTML = `Estado: Sala <span class="room-code">${myRoomCode}</span> | <span class="${cls}">${me.isIt ? 'ERES LA LLEVA' : 'No eres la lleva'}</span> | Jugadores: ${state.playerCount}/4`;
            }
          } else if (myId && requestedPlayerId === myId && (!state.players || !state.players[myId])) {
            myId = null;
            myRoomCode = null;
            roomCodeEl.textContent = '-';
            timerEl.textContent = '--:--';
            statusEl.textContent = 'Estado: Ya no estás en una sala. Crea o únete de nuevo.';
          } else {
            statusEl.textContent = 'Estado: Elige crear o unirte a una sala.';
          }

          scoresEl.innerHTML = '';
          for (const row of state.leaderboard || []) {
            const li = document.createElement('li');
            li.textContent = `${row.name}: ${fmtMs(row.notItTimeMs)}`;
            scoresEl.appendChild(li);
          }
        } catch {
          statusEl.textContent = 'Estado: Error de conexión con servidor';
        }
      }

      function drawGrid() {
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;
        const step = 40;
        for (let x = 0; x < canvas.width; x += step) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, canvas.height);
          ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += step) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(canvas.width, y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGrid();

        if (!state || !state.players) {
          requestAnimationFrame(draw);
          return;
        }

        for (const player of Object.values(state.players)) {
          ctx.beginPath();
          ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
          ctx.fillStyle = player.isIt ? '#ff595e' : '#5bc0be';
          ctx.fill();

          if (player.id === myId) {
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#ffffff';
            ctx.stroke();
          }

          ctx.fillStyle = '#fff';
          ctx.font = '14px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(player.name, player.x, player.y - player.radius - 10);
        }

        if (state.gameEnded) {
          ctx.save();
          ctx.fillStyle = 'rgba(0,0,0,0.45)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#ffd166';
          ctx.font = '700 36px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('PARTIDA TERMINADA', canvas.width / 2, canvas.height / 2 - 10);
          ctx.font = '600 24px sans-serif';
          ctx.fillStyle = '#ffffff';
          ctx.fillText(`Ganador: ${state.winnerName || 'Sin ganador'}`, canvas.width / 2, canvas.height / 2 + 30);
          ctx.restore();
        }

        requestAnimationFrame(draw);
      }

      setInterval(pollState, 120);
      pollState();
      draw();
    </script>
  </body>
</html>
